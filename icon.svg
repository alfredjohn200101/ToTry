<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0C0C0E" rx="114"/>
  
  <!-- ToTry main wordmark -->
  <text x="256" y="245" text-anchor="middle"
        font-family="Georgia, serif"
        font-size="130" font-weight="400">
    <tspan fill="#D4B57A">To</tspan><tspan fill="#C8A96E" font-style="italic" font-weight="300">Try</tspan>
  </text>
  
  <!-- Divider -->
  <line x1="200" y1="320" x2="312" y2="320" stroke="#3D3D45" stroke-width="2"/>
  
  <!-- by Alfred John subtitle -->
  <text x="256" y="370" text-anchor="middle"
        font-family="Georgia, serif"
        font-size="40" font-style="italic" font-weight="400"
        fill="#A8A8B0">by Alfred John</text>
</svg>
